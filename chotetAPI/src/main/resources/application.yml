app:
  jwt:
    secret-key: "${APP_JWT_SECRET_KEY}"
    access-token-expiration: 5400000 # 90 minutes
    refresh-token-expiration: 2592000000 # 30 days
    issuer: "Cho Tet"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
oauth2:
  google:
    client-ids: "${APP_OAUTH2_GOOGLE_CLIENT_IDS:}"
  facebook:
    app-id: "${APP_OAUTH2_FACEBOOK_APP_ID:}"

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: "${EMAIL_USERNAME}"
    password: "${EMAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

cloudinary:
  cloud-name: "${CLOUDINARY_CLOUD_NAME}"
  api-key: "${CLOUDINARY_API_KEY}"
  api-secret: "${CLOUDINARY_API_SECRET}"

gemini:
  api-key: "${GEMINI_API_KEY}"